<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1a"/>
      <stop offset="1" stop-color="#060910"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#b026ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#b026ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#b026ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded dark tile -->
  <rect x="8" y="8" width="240" height="240" rx="46" fill="url(#bg)" stroke="#11202e" stroke-width="2"/>
  <ellipse cx="128" cy="116" rx="120" ry="112" fill="url(#glow)"/>

  <!-- shield -->
  <path d="M128 34 L206 64 V128 C206 178 170 210 128 226 C86 210 50 178 50 128 V64 Z"
        fill="#0c1626" stroke="url(#edge)" stroke-width="6" stroke-linejoin="round"/>

  <!-- countdown ring (TOTP step) -->
  <circle cx="128" cy="124" r="56" fill="none" stroke="#13314a" stroke-width="10"/>
  <!-- ~70% remaining arc, cyan glow -->
  <path d="M128 68 A56 56 0 1 1 72.6 117"
        fill="none" stroke="#00e5ff" stroke-width="10" stroke-linecap="round"/>

  <!-- digit window -->
  <rect x="86" y="108" width="84" height="34" rx="7" fill="#081019" stroke="#2a6b80" stroke-width="2"/>
  <text x="128" y="133" text-anchor="middle"
        font-family="monospace" font-weight="bold" font-size="26"
        letter-spacing="3" fill="#39ff14">072</text>

  <!-- post-quantum spark -->
  <text x="128" y="206" text-anchor="middle"
        font-family="monospace" font-weight="bold" font-size="30"
        letter-spacing="6" fill="#b026ff">PQ</text>
</svg>
